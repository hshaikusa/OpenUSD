<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCP OpenUSD Practice Exam — Set 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500&display=swap');
  :root {
    --green:#76b900;--green-dim:#4a7500;--green-glow:rgba(118,185,0,0.15);
    --bg:#0c0e0a;--surface:#121510;--surface2:#1a1e15;--border:#2a3020;
    --text:#d8e0cc;--text-dim:#7a8a6a;--correct:#4caf50;--incorrect:#f44336;
    --selected:#1e2d10;--mono:'JetBrains Mono',monospace;
    --head:'Syne',sans-serif;--body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.65;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-mark{width:36px;height:36px;background:var(--green);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);flex-shrink:0;}
  .logo-text{font-family:var(--head);font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--green);}
  .logo-sub{font-family:var(--head);font-size:11px;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;}
  .score-bar{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .stat{text-align:center;}
  .stat-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--green);line-height:1;}
  .stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
  .controls{padding:16px 32px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
  button{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:8px 16px;border-radius:4px;cursor:pointer;transition:all 0.15s;}
  button:hover{border-color:var(--green);color:var(--green);}
  button.primary{background:var(--green);color:#000;border-color:var(--green);font-weight:700;}
  button.primary:hover{background:#8fd100;}
  .filter-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 32px;border-bottom:1px solid var(--border);background:var(--bg);}
  .filter-tab{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s;}
  .filter-tab:hover,.filter-tab.active{border-color:var(--green);color:var(--green);background:var(--green-glow);}
  .overall-progress{padding:10px 32px;background:var(--bg);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
  .progress-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s;width:0%;}
  .progress-label{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap;}
  main{max-width:860px;margin:0 auto;padding:32px 24px 80px;}
  .section-header{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--green);margin:32px 0 16px;display:flex;align-items:center;gap:10px;}
  .section-header::after{content:'';flex:1;height:1px;background:var(--border);}
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden;transition:border-color 0.2s;}
  .question-card.highlighted{border-color:var(--green);}
  .question-card[data-answered="correct"]{border-left:3px solid var(--correct);}
  .question-card[data-answered="incorrect"]{border-left:3px solid var(--incorrect);}
  .question-card[data-answered="flagged"]{border-left:3px solid #ff9800;}
  .q-header{display:flex;align-items:flex-start;gap:14px;padding:18px 20px 14px;cursor:pointer;user-select:none;}
  .q-num{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:2px;}
  .q-meta{flex:1;}
  .q-domain{font-size:10px;font-family:var(--mono);color:var(--green);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
  .q-text{font-size:15px;font-weight:500;color:var(--text);line-height:1.5;}
  .q-expand-icon{color:var(--text-dim);font-size:18px;flex-shrink:0;transition:transform 0.2s;margin-top:2px;}
  .q-body{display:none;padding:0 20px 20px;}
  .q-body.open{display:block;}
  .q-expand-icon.open{transform:rotate(180deg);}
  .multi-note{font-size:11px;font-family:var(--mono);color:#ff9800;margin-bottom:12px;letter-spacing:0.04em;}
  .options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .option{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--surface2);transition:all 0.15s;user-select:none;}
  .option:hover{border-color:var(--green);background:var(--selected);}
  .option.selected{border-color:var(--green);background:var(--selected);}
  .option.correct{border-color:var(--correct);background:rgba(76,175,80,0.08);}
  .option.incorrect{border-color:var(--incorrect);background:rgba(244,67,54,0.08);}
  .option.reveal-correct{border-color:var(--correct);background:rgba(76,175,80,0.06);}
  .opt-key{font-family:var(--mono);font-size:11px;font-weight:600;background:var(--border);color:var(--text-dim);padding:2px 7px;border-radius:3px;flex-shrink:0;margin-top:1px;}
  .option.correct .opt-key{background:var(--correct);color:#000;}
  .option.incorrect .opt-key{background:var(--incorrect);color:#fff;}
  .option.reveal-correct .opt-key{background:var(--correct);color:#000;}
  .opt-text{font-size:14px;line-height:1.4;}
  .q-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .q-actions button{font-size:11px;padding:6px 12px;}
  .explanation{display:none;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:14px 16px;font-size:13.5px;line-height:1.6;color:var(--text);margin-top:10px;}
  .explanation.visible{display:block;}
  .explanation strong{color:var(--green);}
  #results-panel{display:none;background:var(--surface);border:1px solid var(--green);border-radius:10px;padding:32px;margin-bottom:32px;text-align:center;}
  #results-panel.visible{display:block;}
  .results-score{font-family:var(--head);font-size:64px;font-weight:800;color:var(--green);line-height:1;margin-bottom:8px;}
  .results-label{font-size:14px;color:var(--text-dim);margin-bottom:20px;}
  .results-breakdown{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-bottom:24px;}
  .breakdown-item{text-align:center;}
  .breakdown-val{font-family:var(--mono);font-size:28px;font-weight:600;}
  .breakdown-val.green{color:var(--correct);}
  .breakdown-val.red{color:var(--incorrect);}
  .breakdown-val.gray{color:var(--text-dim);}
  .breakdown-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;}
  .domain-breakdown{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:20px 0;text-align:left;}
  .domain-row{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;}
  .domain-name{font-size:11px;color:var(--green);font-family:var(--mono);letter-spacing:0.06em;margin-bottom:6px;text-transform:uppercase;}
  .domain-score{font-size:20px;font-weight:700;font-family:var(--head);}
  .flag-btn{background:transparent;border:1px solid #ff980040;color:#ff9800;}
  .flag-btn:hover,.flag-btn.flagged{border-color:#ff9800;background:rgba(255,152,0,0.1);color:#ff9800;}
  #top-btn{position:fixed;bottom:28px;right:28px;background:var(--green);color:#000;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(118,185,0,0.3);transition:opacity 0.2s;text-transform:none;letter-spacing:0;padding:0;font-family:sans-serif;}
  #top-btn:hover{background:#8fd100;color:#000;}
  @media(max-width:600px){header,.controls,.filter-tabs,.overall-progress{padding-left:16px;padding-right:16px;}main{padding:20px 12px 60px;}.results-score{font-size:48px;}}

  .author-block{text-align:right;line-height:1.4;}
  .author-name{font-family:var(--head);font-size:13px;font-weight:700;color:var(--green);letter-spacing:0.02em;}
  .author-cred{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:0.04em;text-transform:uppercase;margin-top:2px;}
  .author-link{font-family:var(--mono);font-size:10px;color:var(--green-dim);text-decoration:none;letter-spacing:0.04em;}
  .author-link:hover{color:var(--green);text-decoration:underline;}
</style>

<script>
const questions = [

// ── COMPOSITION (16) ────────────────────────────────
{
  id:1, domain:"Composition",
  text:"A USD file has two root prims: `/Props` and `/Lights`. No `defaultPrim` metadata is set. A downstream stage adds a reference to this file without specifying a prim path. What happens?",
  multi:false,
  options:[
    "USD composes both `/Props` and `/Lights` under the referencing prim",
    "USD picks the first root prim alphabetically as the default",
    "The reference fails to resolve—USD cannot determine which prim to use without a defaultPrim or explicit prim path",
    "USD merges all root prims into a single Scope prim under the referencing path"
  ],
  answer:[2],
  explanation:"When a layer has no <strong>defaultPrim</strong> metadata and a reference does not specify an explicit prim path, USD cannot determine which prim to use as the root of the reference. The reference <strong>fails silently or raises a composition error</strong>—no content is composed. Always set defaultPrim on referenceable assets."
},
{
  id:2, domain:"Composition",
  text:"A character asset uses `specializes` to inherit from a `/_class_Character` class prim. A downstream shot layer adds a local opinion to the character's `primvars:displayColor`. According to LIVERPS, what is the result?",
  multi:false,
  options:[
    "The class prim's value wins because specializes has higher strength than local opinions",
    "The local opinion in the shot layer wins because local opinions (L) are the strongest arc in LIVERPS",
    "The specializes arc and local opinion are merged into an averaged value",
    "USD raises an error when a local opinion conflicts with a specializes arc"
  ],
  answer:[1],
  explanation:"In LIVERPS, <strong>Local opinions (L)</strong> are the strongest. Even though `specializes` is used for 'persistent refinements,' a <em>stronger layer's local opinion</em> still takes precedence over what flows in from the specializes arc. Local opinions always win in LIVERPS regardless of which composition arc is on the other side."
},
{
  id:3, domain:"Composition",
  text:"A prop asset has the following reference list: `prepend references = [@./geo.usda@, @./materials.usda@]`. Both layers define the attribute `double3 xformOp:translate` on the same prim. Which value wins?",
  multi:false,
  options:[
    "The value from `materials.usda` because it appears later in the list",
    "The value from `geo.usda` because it appears first (prepended) in the list and therefore has stronger opinion",
    "Both values are averaged to produce the final composed value",
    "USD raises a conflict error and uses a built-in default value"
  ],
  answer:[1],
  explanation:"Within a reference list, layers listed <strong>earlier have stronger opinions</strong>. `geo.usda` appears first in the prepended reference list, so its `xformOp:translate` opinion is stronger than `materials.usda`'s. This is why ordering in composition arc lists matters and should be intentional."
},
{
  id:4, domain:"Composition",
  text:"An artist wants to apply a global color grading override to every renderable prim in a stage without modifying any individual asset files. Which composition mechanism allows opinions to be broadcast across the entire scene graph?",
  multi:false,
  options:[
    "A variant set defined on the stage's default prim",
    "A class prim (defined with `class` specifier) used with `inherits` arcs on all relevant prims",
    "A payload arc in the root layer pointing to the override file",
    "A `specializes` arc from the root prim of the stage"
  ],
  answer:[1],
  explanation:"<strong>Class prims with inherits</strong> are the canonical mechanism for broadcasting opinions to many prims. By defining a `/_class_RenderableOverride` class prim and having all renderable prims inherit from it, any change to the class prim is automatically reflected in all inheriting prims. This is how 'global look' overrides are typically implemented."
},
{
  id:5, domain:"Composition",
  text:"Which of the following is the correct ordering of composition arcs from STRONGEST to WEAKEST?",
  multi:false,
  options:[
    "Local → Inherits → Variants → References → Payloads → Specializes",
    "Specializes → Payloads → References → Variants → Inherits → Local",
    "Inherits → Local → Variants → Specializes → References → Payloads",
    "Local → Variants → Inherits → Payloads → References → Specializes"
  ],
  answer:[0],
  explanation:"LIVERPS: <strong>L</strong>ocal → <strong>I</strong>nherits → <strong>V</strong>ariants → <strong>E</strong>xternally referenced → <strong>P</strong>ayloads → <strong>S</strong>pecializes. Local is always strongest; Specializes is always weakest. Payloads and References are both external composition arcs, with References (E) stronger than Payloads (P)."
},
{
  id:6, domain:"Composition",
  text:"A stage has the following sublayer order (top to bottom): `shot_anim.usda`, `shot_layout.usda`, `asset_lib.usda`. The same attribute is authored in all three. Which layer's value appears on the composed stage?",
  multi:false,
  options:[
    "`asset_lib.usda` — the base layer always wins as the source of truth",
    "`shot_layout.usda` — it was authored after the asset layer",
    "`shot_anim.usda` — it is the topmost layer and therefore has the strongest opinion",
    "All three values are composed using an average weighted by layer position"
  ],
  answer:[2],
  explanation:"Sublayers are ordered from strongest to weakest as listed. The <strong>topmost layer has the strongest opinion</strong>. `shot_anim.usda` is listed first (top), so its attribute value wins over `shot_layout.usda` and `asset_lib.usda`. This is the foundation of USD's non-destructive override system."
},
{
  id:7, domain:"Composition",
  text:"What is the key behavioral difference between a `reference` and a `payload` when a stage is opened?",
  multi:false,
  options:[
    "References can only reference USDA files; payloads can reference both USDA and USDC",
    "References are always loaded immediately when the stage opens; payloads can be deferred and loaded on demand via the stage's load rules",
    "Payloads support layer offsets; references do not",
    "References compose at the prim level; payloads compose at the layer level"
  ],
  answer:[1],
  explanation:"The fundamental distinction: <strong>References are always loaded</strong> when a stage opens. <strong>Payloads are deferred</strong>—they are only loaded if their prim is included in the stage's load set (controlled via `UsdStage::Open()` load rules or `UsdStage::Load()`/`Unload()`). This is what makes payloads essential for managing working sets in large scenes."
},
{
  id:8, domain:"Composition",
  text:"A pipeline architect wants to let a rigging layer override geometry positions that were established in a modeling layer, while keeping the modeling layer's material assignments intact. Which layer strategy achieves this cleanly?",
  multi:false,
  options:[
    "Put the rig layer as a sublayer above the modeling layer; the rig's local opinions for geometry positions will override the modeling layer while material assignments from modeling remain unchanged",
    "Use a variant set in the modeling layer with 'rigged' and 'unrigged' variants",
    "Flatten both layers into one before rigging begins",
    "Reference the modeling layer from inside the rig layer using a payload"
  ],
  answer:[0],
  explanation:"By placing the <strong>rig layer above the modeling layer</strong> in the sublayer stack, the rig layer's opinions for specific attributes (like point positions and transforms) override the modeling layer. Attributes NOT authored in the rig layer (like material bindings) continue to come through from the modeling layer unchanged. This is the core power of non-destructive layering."
},
{
  id:9, domain:"Composition",
  text:"A USD asset's internal composition includes three nested references. An external stage references this asset. Can the external stage override opinions inside the asset's internal nested references?",
  multi:false,
  options:[
    "Yes — the external stage's local opinions are always the strongest and override any internal composition",
    "Yes — but only opinions on the asset's defaultPrim can be overridden externally",
    "No — the internal composition of a referenced asset is encapsulated; the external stage can override composed values on prims but cannot alter internal composition arc ordering",
    "No — nested references are always read-only and cannot be overridden even by local opinions"
  ],
  answer:[0],
  explanation:"Encapsulation means the <strong>internal composition arcs</strong> of a referenced asset cannot be overridden. However, the external stage CAN author <strong>local opinions</strong> on the composed prims (via `over` specifiers), and local opinions are the strongest arc in LIVERPS. So while you cannot change how the asset is composed internally, you CAN override the resulting composed values on any prim."
},
{
  id:10, domain:"Composition",
  text:"An asset has a variant set `material` with variants `plastic` and `metal`. A scene stage selects `metal`. Later, a shot layer also authors a variant selection for `material = plastic` on the same prim. Which selection wins?",
  multi:false,
  options:[
    "The scene stage's selection (`metal`) because variant sets are authored in asset files and cannot be overridden",
    "The shot layer's selection (`plastic`) if the shot layer is stronger (higher) in the sublayer stack than the scene stage layer",
    "Both variants are composed simultaneously",
    "USD raises a conflict warning and reverts to the asset's default variant selection"
  ],
  answer:[1],
  explanation:"Variant selections are just metadata opinions and follow standard LIVERPS strength ordering. A <strong>stronger layer's variant selection wins</strong>. If the shot layer is higher in the sublayer stack (or uses a stronger composition arc), its `plastic` selection overrides the scene stage's `metal` selection. This allows shot-level variant overrides."
},
{
  id:11, domain:"Composition",
  text:"Which specifier should be used on a prim that serves as a shared template—one whose opinions should propagate to all prims that inherit from it, but which should NOT appear as a renderable prim itself?",
  multi:false,
  options:[
    "`def` — standard definition, can be traversed and rendered",
    "`over` — non-destructive override, used for inheritance templates",
    "`class` — defines a non-instantiated template prim that is excluded from normal stage traversal",
    "`payload` — deferred definition prim"
  ],
  answer:[2],
  explanation:"The <strong>`class`</strong> specifier creates a prim that acts as a pure template. Class prims are excluded from default stage traversal (they won't be rendered) and exist solely to share opinions with other prims via `inherits`. This is essential for shared look-dev, shared transforms, or any pattern where you want broadcast overrides without adding unwanted geometry to the scene."
},
{
  id:12, domain:"Composition",
  text:"A layer offset of `offset=0, scale=0.5` is applied to a reference. An animation with a time sample at stage time 20 will be evaluated at what local time inside the referenced layer?",
  multi:false,
  options:[
    "Local time 40 — stage time is divided by scale to get local time",
    "Local time 10 — stage time is multiplied by scale to get local time",
    "Local time 20 — scale only affects the offset, not the time value",
    "Local time 0.5 — scale is applied as a fraction of the stage time"
  ],
  answer:[0],
  explanation:"Layer offsets transform from layer-local time to stage time using: <em>stageTime = localTime × scale + offset</em>. Rearranging: <em>localTime = (stageTime − offset) / scale</em>. With offset=0, scale=0.5: localTime = (20 − 0) / 0.5 = <strong>40</strong>. A scale of 0.5 makes the animation play at half speed on stage (stage needs to advance to time 20 to see what's at local time 10)."
},
{
  id:13, domain:"Composition",
  text:"Two assets, `ChairA` and `ChairB`, both reference the same `cushion.usda` asset. A studio wants to update the cushion's UV layout without changing either chair asset. How does this work in USD?",
  multi:false,
  options:[
    "Edit `cushion.usda` directly — since both chairs reference it, both automatically reflect the change when the stage is recomposed",
    "Edit each chair's USD file to include the UV override as a local opinion",
    "The cushion must be duplicated for each chair before any modifications can be made",
    "Changes to `cushion.usda` require a flatten operation on all referencing stages before they take effect"

  body.appendChild(opts);
  const actions=document.createElement('div');actions.className='q-actions';
  actions.innerHTML=`<button onclick="checkAnswer(${q.id})">Check Answer</button><button onclick="revealExplanation(${q.id})">Show Explanation</button><button class="flag-btn" id="flag-${q.id}" onclick="toggleFlag(${q.id})">Flag</button>`;
  body.appendChild(actions);
  const explanation=document.createElement('div');explanation.className='explanation';explanation.id=`exp-${q.id}`;
  explanation.innerHTML=`<strong>Explanation:</strong> ${q.explanation}`;body.appendChild(explanation);
  card.appendChild(body);return card;
}

function getDomainWeight(domain){
  const w={"Composition":23,"Content Aggregation":10,"Customizing USD":6,"Data Exchange":15,"Data Modeling":13,"Debugging":11,"Pipeline Development":14,"Visualization":8};
  for(const[k,v]of Object.entries(w)){if(domain.includes(k.split(' ')[0]))return v;}return 0;
}

function toggleCard(qId){
  const body=document.getElementById(`body-${qId}`);const icon=document.querySelector(`#q-${qId} .q-expand-icon`);
  body.classList.toggle('open');icon.classList.toggle('open');
}

function selectOption(qId,idx){
  if(state.submitted)return;
  const q=questions.find(x=>x.id===qId);
  if(!state.selections[qId])state.selections[qId]=new Set();
  if(q.multi){if(state.selections[qId].has(idx))state.selections[qId].delete(idx);else state.selections[qId].add(idx);}
  else state.selections[qId]=new Set([idx]);
  renderOptions(qId,false);updateStats();
}

function renderOptions(qId,showCorrect){
  const q=questions.find(x=>x.id===qId);const sel=state.selections[qId]||new Set();
  q.options.forEach((_,i)=>{
    const el=document.getElementById(`opt-${qId}-${i}`);el.className='option';
    const isSelected=sel.has(i);const isCorrect=q.answer.includes(i);
    if(showCorrect){if(isSelected&&isCorrect)el.classList.add('correct');else if(isSelected&&!isCorrect)el.classList.add('incorrect');else if(!isSelected&&isCorrect)el.classList.add('reveal-correct');}
    else if(isSelected)el.classList.add('selected');
  });
}

function checkAnswer(qId){
  const q=questions.find(x=>x.id===qId);const sel=state.selections[qId];
  if(!sel||sel.size===0){alert('Please select an answer first.');return;}
  renderOptions(qId,true);revealExplanation(qId);
  const card=document.getElementById(`q-${qId}`);
  card.setAttribute('data-answered',setsEqual(sel,new Set(q.answer))?'correct':'incorrect');
  state.revealed[qId]=true;updateStats();
}

function revealExplanation(qId){
  const exp=document.getElementById(`exp-${qId}`);const body=document.getElementById(`body-${qId}`);
  exp.classList.add('visible');if(!body.classList.contains('open'))toggleCard(qId);
}

function revealAll(){
  questions.forEach(q=>{
    if(!state.revealed[q.id]){
      renderOptions(q.id,true);revealExplanation(q.id);
      const sel=state.selections[q.id];const card=document.getElementById(`q-${q.id}`);
      if(sel&&sel.size>0)card.setAttribute('data-answered',setsEqual(sel,new Set(q.answer))?'correct':'incorrect');
      state.revealed[q.id]=true;
    }
  });updateStats();
}

function submitAll(){
  state.submitted=true;let correct=0,incorrect=0,skipped=0;const domainStats={};
  questions.forEach(q=>{
    const domain=q.domain;if(!domainStats[domain])domainStats[domain]={c:0,t:0};domainStats[domain].t++;
    const sel=state.selections[q.id];renderOptions(q.id,true);revealExplanation(q.id);
    const card=document.getElementById(`q-${q.id}`);
    if(!sel||sel.size===0){skipped++;card.setAttribute('data-answered','flagged');}
    else if(setsEqual(sel,new Set(q.answer))){correct++;domainStats[domain].c++;card.setAttribute('data-answered','correct');}
    else{incorrect++;card.setAttribute('data-answered','incorrect');}
    state.revealed[q.id]=true;
  });
  const pct=Math.round((correct/questions.length)*100);
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-incorrect').textContent=incorrect;
  document.getElementById('res-skipped').textContent=skipped;
  const db=document.getElementById('domain-breakdown');db.innerHTML='';
  Object.entries(domainStats).forEach(([domain,s])=>{
    const pctD=s.t>0?Math.round((s.c/s.t)*100):0;
    const color=pctD>=70?'#4caf50':pctD>=50?'#ff9800':'#f44336';
    db.innerHTML+=`<div class="domain-row"><div class="domain-name">${domain}</div><div class="domain-score" style="color:${color}">${s.c}/${s.t} — ${pctD}%</div></div>`;
  });
  document.getElementById('results-panel').classList.add('visible');
  window.scrollTo({top:0,behavior:'smooth'});updateStats();
}

function resetExam(){
  Object.keys(state.selections).forEach(k=>delete state.selections[k]);
  Object.keys(state.revealed).forEach(k=>delete state.revealed[k]);
  Object.keys(state.flags).forEach(k=>delete state.flags[k]);
  state.submitted=false;buildQuiz();
  document.getElementById('results-panel').classList.remove('visible');
  updateStats();window.scrollTo({top:0,behavior:'smooth'});
}

function toggleFlag(qId){
  const btn=document.getElementById(`flag-${qId}`);const card=document.getElementById(`q-${qId}`);
  if(state.flags[qId]){delete state.flags[qId];btn.classList.remove('flagged');if(card.getAttribute('data-answered')==='flagged')card.removeAttribute('data-answered');}
  else{state.flags[qId]=true;btn.classList.add('flagged');}
  updateStats();
}

function filterDomain(domain,btn){
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.question-card,.section-header').forEach(el=>{
    if(domain==='all')el.style.display='';
    else{const elDomain=el.getAttribute('data-domain')||'';el.style.display=elDomain.includes(domain)?'':'none';}
  });
}

function scrollToFirstUnanswered(){
  for(const q of questions){
    const card=document.getElementById(`q-${q.id}`);
    if(card&&card.style.display!=='none'&&!state.revealed[q.id]){
      card.scrollIntoView({behavior:'smooth',block:'center'});
      card.classList.add('highlighted');setTimeout(()=>card.classList.remove('highlighted'),1500);return;
    }
  }
  alert('All visible questions have been answered!');
}

function updateStats(){
  let answered=0,correct=0,incorrect=0,flagged=0;
  questions.forEach(q=>{
    if(state.revealed[q.id]){const sel=state.selections[q.id];if(sel&&sel.size>0){answered++;if(setsEqual(sel,new Set(q.answer)))correct++;else incorrect++;}}
    if(state.flags[q.id])flagged++;
  });
  document.getElementById('hdr-answered').textContent=answered;
  document.getElementById('hdr-correct').textContent=correct;
  document.getElementById('hdr-incorrect').textContent=incorrect;
  document.getElementById('hdr-flagged').textContent=flagged;
  const pct=Math.round((answered/questions.length)*100);
  document.getElementById('prog-label').textContent=`${answered} / ${questions.length}`;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

function setsEqual(a,b){if(a.size!==b.size)return false;for(const v of a)if(!b.has(v))return false;return true;}

buildQuiz();updateStats();
</script>
</body>
</html>
