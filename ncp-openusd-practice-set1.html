<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCP OpenUSD Practice Exam — Set 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500&display=swap');

  :root {
    --green: #76b900;
    --green-dim: #4a7500;
    --green-glow: rgba(118,185,0,0.15);
    --bg: #0c0e0a;
    --surface: #121510;
    --surface2: #1a1e15;
    --border: #2a3020;
    --text: #d8e0cc;
    --text-dim: #7a8a6a;
    --correct: #4caf50;
    --incorrect: #f44336;
    --selected: #1e2d10;
    --mono: 'JetBrains Mono', monospace;
    --head: 'Syne', sans-serif;
    --body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--green);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--green);
  }

  .logo-sub {
    font-family: var(--head);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .score-bar {
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--green);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .progress-ring-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .progress-ring {
    transform: rotate(-90deg);
  }

  /* ── CONTROLS ── */
  .controls {
    padding: 16px 32px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  button:hover { border-color: var(--green); color: var(--green); }
  button.primary { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }
  button.primary:hover { background: #8fd100; }

  .filter-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .filter-tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-tab:hover, .filter-tab.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-glow);
  }

  /* ── MAIN ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .section-header {
    font-family: var(--head);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--green);
    margin: 32px 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .question-card:target, .question-card.highlighted {
    border-color: var(--green);
  }

  .question-card[data-answered="correct"] { border-left: 3px solid var(--correct); }
  .question-card[data-answered="incorrect"] { border-left: 3px solid var(--incorrect); }
  .question-card[data-answered="flagged"] { border-left: 3px solid #ff9800; }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px 14px;
    cursor: pointer;
    user-select: none;
  }

  .q-num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .q-meta {
    flex: 1;
  }

  .q-domain {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--green);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
  }

  .q-expand-icon {
    color: var(--text-dim);
    font-size: 18px;
    flex-shrink: 0;
    transition: transform 0.2s;
    margin-top: 2px;
  }

  .q-body { display: none; padding: 0 20px 20px; }
  .q-body.open { display: block; }
  .q-expand-icon.open { transform: rotate(180deg); }

  .multi-note {
    font-size: 11px;
    font-family: var(--mono);
    color: #ff9800;
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    background: var(--surface2);
    transition: all 0.15s;
    user-select: none;
  }

  .option:hover { border-color: var(--green); background: var(--selected); }

  .option.selected { border-color: var(--green); background: var(--selected); }

  .option.correct { border-color: var(--correct); background: rgba(76,175,80,0.08); }
  .option.incorrect { border-color: var(--incorrect); background: rgba(244,67,54,0.08); }
  .option.reveal-correct { border-color: var(--correct); background: rgba(76,175,80,0.06); }

  .opt-key {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    background: var(--border);
    color: var(--text-dim);
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .option.correct .opt-key { background: var(--correct); color: #000; }
  .option.incorrect .opt-key { background: var(--incorrect); color: #fff; }
  .option.reveal-correct .opt-key { background: var(--correct); color: #000; }

  .opt-text { font-size: 14px; line-height: 1.4; }

  .q-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .q-actions button { font-size: 11px; padding: 6px 12px; }

  .explanation {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    margin-top: 10px;
  }

  .explanation.visible { display: block; }

  .explanation strong { color: var(--green); }

  .code-snippet {
    font-family: var(--mono);
    font-size: 12px;
    background: #0a0c08;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    margin: 8px 0;
    white-space: pre;
    overflow-x: auto;
    color: #a8c070;
  }

  /* ── PROGRESS BAR ── */
  .overall-progress {
    padding: 10px 32px;
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  .progress-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  /* ── RESULTS PANEL ── */
  #results-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--green);
    border-radius: 10px;
    padding: 32px;
    margin-bottom: 32px;
    text-align: center;
  }

  #results-panel.visible { display: block; }

  .results-score {
    font-family: var(--head);
    font-size: 64px;
    font-weight: 800;
    color: var(--green);
    line-height: 1;
    margin-bottom: 8px;
  }

  .results-label { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }

  .results-breakdown {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .breakdown-item { text-align: center; }
  .breakdown-val { font-family: var(--mono); font-size: 28px; font-weight: 600; }
  .breakdown-val.green { color: var(--correct); }
  .breakdown-val.red { color: var(--incorrect); }
  .breakdown-val.gray { color: var(--text-dim); }
  .breakdown-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }

  .domain-breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin: 20px 0;
    text-align: left;
  }

  .domain-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }

  .domain-name { font-size: 11px; color: var(--green); font-family: var(--mono); letter-spacing: 0.06em; margin-bottom: 6px; text-transform: uppercase; }
  .domain-score { font-size: 20px; font-weight: 700; font-family: var(--head); }

  /* ── FLAG ── */
  .flag-btn { background: transparent; border: 1px solid #ff980040; color: #ff9800; }
  .flag-btn:hover, .flag-btn.flagged { border-color: #ff9800; background: rgba(255,152,0,0.1); color: #ff9800; }

  /* Scroll to top */
  #top-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--green);
    color: #000;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(118,185,0,0.3);
    transition: opacity 0.2s;
    text-transform: none;
    letter-spacing: 0;
    padding: 0;
    font-family: sans-serif;
  }

  #top-btn:hover { background: #8fd100; color: #000; }

  @media (max-width: 600px) {
    header, .controls, .filter-tabs, .overall-progress { padding-left: 16px; padding-right: 16px; }
    main { padding: 20px 12px 60px; }
    .results-score { font-size: 48px; }
  }

  .author-block{text-align:right;line-height:1.4;}
  .author-name{font-family:var(--head);font-size:13px;font-weight:700;color:var(--green);letter-spacing:0.02em;}
  .author-cred{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:0.04em;text-transform:uppercase;margin-top:2px;}
  .author-link{font-family:var(--mono);font-size:10px;color:var(--green-dim);text-decoration:none;letter-spacing:0.04em;}
  .author-link:hover{color:var(--green);text-decoration:underline;}
</style>
</head>

  <button class="filter-tab" onclick="filterDomain('Customizing USD',this)">Customizing USD (4)</button>
  <button class="filter-tab" onclick="filterDomain('Data Exchange',this)">Data Exchange (11)</button>
  <button class="filter-tab" onclick="filterDomain('Data Modeling',this)">Data Modeling (9)</button>
  <button class="filter-tab" onclick="filterDomain('Debugging',this)">Debugging (8)</button>

      <div class="breakdown-item"><div class="breakdown-val green" id="res-correct">0</div><div class="breakdown-label">Correct</div></div>

<script>
// ═══════════════════════════════════════════════════════
// QUESTION BANK — 70 Questions
// ═══════════════════════════════════════════════════════
const questions = [

// ── COMPOSITION (16) ────────────────────────────────
{
  id: 1, domain: "Composition",
  text: "In USD, the acronym LIVERPS describes the strength ordering of composition arcs. Which of the following correctly represents the order from strongest to weakest?",
  multi: false,
  options: [
    "Local opinions → Inherits → Variants → References → Payloads → Specializes",
    "Local opinions → Inherits → Variants → References → Specializes → Payloads",
    "Variants → Local opinions → Inherits → References → Payloads → Specializes",
    "Inherits → Local opinions → Variants → Specializes → References → Payloads"
  ],
  answer: [0],
  explanation: "LIVERPS stands for: <strong>L</strong>ocal opinions, <strong>I</strong>nherits, <strong>V</strong>ariants, <strong>E</strong>xternally-referenced (References), <strong>P</strong>ayloads, <strong>S</strong>pecializes — from strongest to weakest. Payloads come after References and before Specializes."
},
{
  id: 2, domain: "Composition",
  text: "A shot layer references a character asset using `prepend references`. An animator then directly authors a translate value on the referenced prim inside the shot layer. According to LIVERPS, which opinion wins?",
  multi: false,
  options: [
    "The translate value inside the reference, because it was authored first",
    "The translate value in the shot layer, because local opinions are stronger than references",
    "Neither—USD does not allow local overrides on referenced prims",
    "The reference wins because `prepend` gives it higher priority than local opinions"
  ],
  answer: [1],
  explanation: "<strong>Local opinions (L)</strong> are the strongest arc in LIVERPS, sitting above inherits, variants, references, payloads, and specializes. A value authored directly in the shot layer on a referenced prim will always override any opinion from the reference itself."
},
{
  id: 3, domain: "Composition",
  text: "A pipeline team wants multiple artists to work simultaneously on the same character asset—one on geometry, one on materials, and one on rigging—without overwriting each other. Which composition mechanism is best suited for this?",
  multi: false,
  options: [
    "Variant sets, with each artist in a different variant",
    "Sublayers within the asset, with each workstream in a separate layer",
    "Separate references from a shared parent stage file",
    "Payloads, with each workstream deferred until needed"
  ],
  answer: [1],
  explanation: "<strong>Sublayers</strong> allow multiple layers to be stacked within the same stage or asset. Each artist can work in their own sublayer (geometry.usda, materials.usda, rig.usda) and opinions are composed top-to-bottom. This is the standard pattern for modeling multi-user collaborative workstreams within a single asset."
},
{
  id: 4, domain: "Composition",
  text: "When referencing a USD layer that contains multiple root prims, USD needs to know which prim to use as the target. What is the correct way to specify this?",
  multi: false,
  options: [
    "Set the `rootPrim` metadata on the referencing prim",
    "Add a `primPath` argument to the reference arc",
    "Set the `defaultPrim` metadata in the referenced layer's file header",
    "Rename all prims to match the referencing prim's name"
  ],
  answer: [2],
  explanation: "<strong>defaultPrim</strong> metadata, set in the layer's header (e.g., `defaultPrim = \"Robot\"`), tells USD which root prim to use when the layer is referenced without an explicit prim path. If omitted, the reference must supply an explicit prim path—otherwise composition will fail."
},
{
  id: 5, domain: "Composition",
  text: "You author a variant set `surfacing` on a prop asset with options `wet` and `dry`. An FX artist wants to override just the wet variant's emissive value in a downstream shot. Which specifier should they use when targeting the relevant prim inside the variant?",
  multi: false,
  options: [
    "`def` — to redefine the prim completely in the shot layer",
    "`class` — because class prims propagate across the whole stage",
    "`over` — to add non-destructive opinions on top of the existing definition",
    "`payload` — to load the override only when needed"
  ],
  answer: [2],
  explanation: "<strong>`over`</strong> is a specifier that authors opinions on a prim without requiring it to exist in the current layer. It is the correct way to non-destructively add or change attributes on existing prims (including those inside variants) from a downstream or shot layer."
},
{
  id: 6, domain: "Composition",
  text: "A technical director sets `prepend references` on a prim that already has `append references`. What is the practical effect of using `prepend` instead of `append`?",
  multi: false,
  options: [
    "Prepended references are loaded before appended ones and have higher opinion strength",
    "Prepended references are ignored if any appended reference exists",
    "Prepend makes the reference load on demand, while append loads it eagerly",
    "Append and prepend are functionally identical for references"
  ],
  answer: [0],
  explanation: "List editing keywords like <strong>prepend</strong> and <strong>append</strong> control the order of items in lists. A prepended reference appears earlier in the reference list, meaning it has stronger opinions than an appended reference on the same prim. This matters when multiple references contribute opinions to the same attribute."
},
{
  id: 7, domain: "Composition",
  text: "An asset uses a payload arc to load its geometry. A downstream pipeline stage wants to process metadata about the asset (bounding box, kind, purpose) without loading the full geometry. What is the correct behavior?",
  multi: false,
  options: [
    "Payloads must always be loaded before any metadata is accessible",
    "Metadata and properties outside the payload are accessible even when the payload is unloaded",
    "The prim disappears entirely from the stage when its payload is unloaded",
    "Payloads can never be unloaded once a stage is opened"
  ],
  answer: [1],
  explanation: "<strong>Payloads</strong> are specifically designed for deferred loading of heavy data. Prim identity, metadata (kind, purpose, extentsHint), and properties defined <em>outside</em> the payload arc remain accessible on an unloaded prim. This is the core advantage over references—payloads let pipelines manage working sets efficiently."
},
{
  id: 8, domain: "Composition",
  text: "A prop has a variant set `lod` with values `high`, `mid`, and `low`. A set-dressing stage selects `mid`, but a shot layer wants to override this to `low` for performance. Where should the variant selection for the shot be authored?",
  multi: false,
  options: [
    "Inside the prop's own USD file, replacing the default selection",
    "In the set-dressing layer using a `prepend sublayers` to the shot",
    "Directly on the referencing prim in the shot layer using the `variants` metadata",
    "In a separate payload layer that references the prop"
  ],
  answer: [2],
  explanation: "Variant selections are authored as <strong>metadata on the referencing prim</strong> (`variants = { string lod = \"low\" }`). A stronger layer (e.g., the shot layer) can override a weaker layer's variant selection because variant selection opinions follow LIVERPS strength ordering."
},

    container.appendChild(sh);
    qs.forEach(q => {
      container.appendChild(buildCard(q));
    });
  });
}

function buildCard(q) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = `q-${q.id}`;
  card.setAttribute('data-domain', q.domain);

  const header = document.createElement('div');
  header.className = 'q-header';
  header.innerHTML = `
    <div class="q-num">#${q.id}</div>
    <div class="q-meta">
      <div class="q-domain">${q.domain} · ${Math.round(getDomainWeight(q.domain))}% exam weight</div>
      <div class="q-text">${q.text}</div>
    </div>
    <div class="q-expand-icon">▾</div>
  `;
  header.addEventListener('click', () => toggleCard(q.id));
  card.appendChild(header);

  const body = document.createElement('div');
  body.className = 'q-body';
  body.id = `body-${q.id}`;

  if (q.multi) {
    body.innerHTML += `<div class="multi-note">★ SELECT ALL THAT APPLY</div>`;
  }

  const opts = document.createElement('div');
  opts.className = 'options';
  const letters = ['A','B','C','D','E'];
  q.options.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'option';
    el.id = `opt-${q.id}-${i}`;
    el.innerHTML = `<span class="opt-key">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    el.addEventListener('click', () => selectOption(q.id, i));
    opts.appendChild(el);
  });
  body.appendChild(opts);

  const actions = document.createElement('div');
  actions.className = 'q-actions';
  actions.innerHTML = `
    <button onclick="checkAnswer(${q.id})">Check Answer</button>
    <button onclick="revealExplanation(${q.id})">Show Explanation</button>
    <button class="flag-btn" id="flag-${q.id}" onclick="toggleFlag(${q.id})">Flag</button>
  `;
  body.appendChild(actions);

  const explanation = document.createElement('div');
  explanation.className = 'explanation';
  explanation.id = `exp-${q.id}`;
  explanation.innerHTML = `<strong>Explanation:</strong> ${q.explanation}`;
  body.appendChild(explanation);

  card.appendChild(body);
  return card;
}

function getDomainWeight(domain) {
  const weights = {
    "Composition": 23, "Content Aggregation": 10, "Customizing USD": 6,
    "Data Exchange": 15, "Data Modeling": 13, "Debugging": 11,
    "Pipeline Development": 14, "Visualization": 8
  };
  for (const [k,v] of Object.entries(weights)) {
    if (domain.includes(k.split(' ')[0])) return v;
  }
  return 0;
}

function toggleCard(qId) {
  const body = document.getElementById(`body-${qId}`);
  const icon = document.querySelector(`#q-${qId} .q-expand-icon`);
  body.classList.toggle('open');
  icon.classList.toggle('open');
}

function selectOption(qId, idx) {
  if (state.submitted) return;
  const q = questions.find(x => x.id === qId);
  if (!state.selections[qId]) state.selections[qId] = new Set();
  if (q.multi) {
    if (state.selections[qId].has(idx)) {
      state.selections[qId].delete(idx);
    } else {
      state.selections[qId].add(idx);
    }
  } else {
    state.selections[qId] = new Set([idx]);
  }
  renderOptions(qId, false);
  updateStats();
}

function renderOptions(qId, showCorrect) {
  const q = questions.find(x => x.id === qId);
  const sel = state.selections[qId] || new Set();
  const letters = ['A','B','C','D','E'];
  q.options.forEach((_, i) => {
    const el = document.getElementById(`opt-${qId}-${i}`);
    el.className = 'option';
    const isSelected = sel.has(i);
    const isCorrect = q.answer.includes(i);
    if (showCorrect) {
      if (isSelected && isCorrect) el.classList.add('correct');
      else if (isSelected && !isCorrect) el.classList.add('incorrect');
      else if (!isSelected && isCorrect) el.classList.add('reveal-correct');
    } else {
      if (isSelected) el.classList.add('selected');
    }
  });
}

function checkAnswer(qId) {
  const q = questions.find(x => x.id === qId);
  const sel = state.selections[qId];
  if (!sel || sel.size === 0) { alert('Please select an answer first.'); return; }
  renderOptions(qId, true);
  revealExplanation(qId);
  const card = document.getElementById(`q-${qId}`);
  const correct = setsEqual(sel, new Set(q.answer));
  card.setAttribute('data-answered', correct ? 'correct' : 'incorrect');
  state.revealed[qId] = true;
  updateStats();
}

function revealExplanation(qId) {
  const exp = document.getElementById(`exp-${qId}`);
  const body = document.getElementById(`body-${qId}`);
  exp.classList.add('visible');
  if (!body.classList.contains('open')) toggleCard(qId);
}

function revealAll() {
  questions.forEach(q => {
    if (!state.revealed[q.id]) {
      renderOptions(q.id, true);
      revealExplanation(q.id);
      const sel = state.selections[q.id];
      const card = document.getElementById(`q-${q.id}`);
      if (sel && sel.size > 0) {
        const correct = setsEqual(sel, new Set(q.answer));
        card.setAttribute('data-answered', correct ? 'correct' : 'incorrect');
      }
      state.revealed[q.id] = true;
    }
  });
  updateStats();
}

function submitAll() {
  state.submitted = true;
  let correct = 0, incorrect = 0, skipped = 0;
  const domainStats = {};

  questions.forEach(q => {
    const domain = q.domain;
    if (!domainStats[domain]) domainStats[domain] = { c: 0, t: 0 };
    domainStats[domain].t++;

    const sel = state.selections[q.id];
    renderOptions(q.id, true);
    revealExplanation(q.id);
    const card = document.getElementById(`q-${q.id}`);

    if (!sel || sel.size === 0) {
      skipped++;
      card.setAttribute('data-answered', 'flagged');
    } else if (setsEqual(sel, new Set(q.answer))) {
      correct++;
      domainStats[domain].c++;
      card.setAttribute('data-answered', 'correct');
    } else {
      incorrect++;
      card.setAttribute('data-answered', 'incorrect');
    }
    state.revealed[q.id] = true;
  });

  const total = correct + incorrect + skipped;
  const pct = Math.round((correct / questions.length) * 100);

  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-incorrect').textContent = incorrect;
  document.getElementById('res-skipped').textContent = skipped;

  const db = document.getElementById('domain-breakdown');
  db.innerHTML = '';
  Object.entries(domainStats).forEach(([domain, s]) => {
    const pctD = s.t > 0 ? Math.round((s.c / s.t) * 100) : 0;
    const color = pctD >= 70 ? '#4caf50' : pctD >= 50 ? '#ff9800' : '#f44336';
    db.innerHTML += `<div class="domain-row">
      <div class="domain-name">${domain}</div>
      <div class="domain-score" style="color:${color}">${s.c}/${s.t} — ${pctD}%</div>
    </div>`;
  });

  document.getElementById('results-panel').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateStats();
}

function resetExam() {
  Object.keys(state.selections).forEach(k => delete state.selections[k]);
  Object.keys(state.revealed).forEach(k => delete state.revealed[k]);
  Object.keys(state.flags).forEach(k => delete state.flags[k]);
  state.submitted = false;
  buildQuiz();
  document.getElementById('results-panel').classList.remove('visible');
  updateStats();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleFlag(qId) {
  const btn = document.getElementById(`flag-${qId}`);
  const card = document.getElementById(`q-${qId}`);
  if (state.flags[qId]) {
    delete state.flags[qId];
    btn.classList.remove('flagged');
    if (card.getAttribute('data-answered') === 'flagged') card.removeAttribute('data-answered');
  } else {
    state.flags[qId] = true;
    btn.classList.add('flagged');
  }
  updateStats();
}

function filterDomain(domain, btn) {
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.question-card, .section-header').forEach(el => {
    if (domain === 'all') {
      el.style.display = '';
    } else {
      const elDomain = el.getAttribute('data-domain') || '';
      el.style.display = elDomain.includes(domain) ? '' : 'none';
    }
  });
}

function scrollToFirstUnanswered() {
  for (const q of questions) {
    const card = document.getElementById(`q-${q.id}`);
    if (card && card.style.display !== 'none' && !state.revealed[q.id]) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.classList.add('highlighted');
      setTimeout(() => card.classList.remove('highlighted'), 1500);
      return;
    }
  }
  alert('All visible questions have been answered!');
}

function updateStats() {
  let answered = 0, correct = 0, incorrect = 0, flagged = 0;
  questions.forEach(q => {
    if (state.revealed[q.id]) {
      const sel = state.selections[q.id];
      if (sel && sel.size > 0) {
        answered++;
        if (setsEqual(sel, new Set(q.answer))) correct++; else incorrect++;
      }
    }
    if (state.flags[q.id]) flagged++;
  });
  document.getElementById('hdr-answered').textContent = answered;
  document.getElementById('hdr-correct').textContent = correct;
  document.getElementById('hdr-incorrect').textContent = incorrect;
  document.getElementById('hdr-flagged').textContent = flagged;

  const total = questions.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('prog-label').textContent = `${answered} / ${total}`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}

function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const v of a) if (!b.has(v)) return false;
  return true;
}

// ── INIT ──
buildQuiz();
updateStats();
</script>
</body>
</html>
