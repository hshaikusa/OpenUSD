<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500&display=swap');
  :root {
    --green:#76b900;--green-dim:#4a7500;--green-glow:rgba(118,185,0,0.15);
    --bg:#0c0e0a;--surface:#121510;--surface2:#1a1e15;--border:#2a3020;

    --selected:#1e2d10;--mono:'JetBrains Mono',monospace;

  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.65;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-mark{width:36px;height:36px;background:var(--green);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);flex-shrink:0;}
  .logo-text{font-family:var(--head);font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--green);}
  .logo-sub{font-family:var(--head);font-size:11px;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;}
  .score-bar{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .stat{text-align:center;}
  .stat-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--green);line-height:1;}
  .stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
  .controls{padding:16px 32px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
  button{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:8px 16px;border-radius:4px;cursor:pointer;transition:all 0.15s;}
  button:hover{border-color:var(--green);color:var(--green);}
  button.primary{background:var(--green);color:#000;border-color:var(--green);font-weight:700;}
  button.primary:hover{background:#8fd100;}
  .filter-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 32px;border-bottom:1px solid var(--border);background:var(--bg);}
  .filter-tab{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s;}
  .filter-tab:hover,.filter-tab.active{border-color:var(--green);color:var(--green);background:var(--green-glow);}
  .overall-progress{padding:10px 32px;background:var(--bg);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
  .progress-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s;width:0%;}
  .progress-label{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap;}
  main{max-width:860px;margin:0 auto;padding:32px 24px 80px;}
  .section-header{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--green);margin:32px 0 16px;display:flex;align-items:center;gap:10px;}
  .section-header::after{content:'';flex:1;height:1px;background:var(--border);}
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden;transition:border-color 0.2s;}
  .question-card.highlighted{border-color:var(--green);}
  .question-card[data-answered="correct"]{border-left:3px solid var(--correct);}
  .question-card[data-answered="incorrect"]{border-left:3px solid var(--incorrect);}
  .question-card[data-answered="flagged"]{border-left:3px solid #ff9800;}
  .q-header{display:flex;align-items:flex-start;gap:14px;padding:18px 20px 14px;cursor:pointer;user-select:none;}
  .q-num{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:2px;}
  .q-meta{flex:1;}
  .q-domain{font-size:10px;font-family:var(--mono);color:var(--green);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
  .q-text{font-size:15px;font-weight:500;color:var(--text);line-height:1.5;}
  .q-expand-icon{color:var(--text-dim);font-size:18px;flex-shrink:0;transition:transform 0.2s;margin-top:2px;}
  .q-body{display:none;padding:0 20px 20px;}
  .q-body.open{display:block;}
  .q-expand-icon.open{transform:rotate(180deg);}

  .options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}

  .option:hover{border-color:var(--green);background:var(--selected);}
  .option.selected{border-color:var(--green);background:var(--selected);}
  .option.correct{border-color:var(--correct);background:rgba(76,175,80,0.08);}
  .option.incorrect{border-color:var(--incorrect);background:rgba(244,67,54,0.08);}
  .option.reveal-correct{border-color:var(--correct);background:rgba(76,175,80,0.06);}
  .opt-key{font-family:var(--mono);font-size:11px;font-weight:600;background:var(--border);color:var(--text-dim);padding:2px 7px;border-radius:3px;flex-shrink:0;margin-top:1px;}
  .option.correct .opt-key{background:var(--correct);color:#000;}
  .option.incorrect .opt-key{background:var(--incorrect);color:#fff;}
  .option.reveal-correct .opt-key{background:var(--correct);color:#000;}
  .opt-text{font-size:14px;line-height:1.4;}
  .q-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .q-actions button{font-size:11px;padding:6px 12px;}
  .explanation{display:none;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:14px 16px;font-size:13.5px;line-height:1.6;color:var(--text);margin-top:10px;}
  .explanation.visible{display:block;}
  .explanation strong{color:var(--green);}
  #results-panel{display:none;background:var(--surface);border:1px solid var(--green);border-radius:10px;padding:32px;margin-bottom:32px;text-align:center;}
  #results-panel.visible{display:block;}
  .results-score{font-family:var(--head);font-size:64px;font-weight:800;color:var(--green);line-height:1;margin-bottom:8px;}
  .results-label{font-size:14px;color:var(--text-dim);margin-bottom:20px;}
  .results-breakdown{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-bottom:24px;}
  .breakdown-item{text-align:center;}
  .breakdown-val{font-family:var(--mono);font-size:28px;font-weight:600;}
  .breakdown-val.green{color:var(--correct);}
  .breakdown-val.red{color:var(--incorrect);}
  .breakdown-val.gray{color:var(--text-dim);}
  .breakdown-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;}
  .domain-breakdown{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:20px 0;text-align:left;}
  .domain-row{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;}
  .domain-name{font-size:11px;color:var(--green);font-family:var(--mono);letter-spacing:0.06em;margin-bottom:6px;text-transform:uppercase;}
  .domain-score{font-size:20px;font-weight:700;font-family:var(--head);}
  .flag-btn{background:transparent;border:1px solid #ff980040;color:#ff9800;}
  .flag-btn:hover,.flag-btn.flagged{border-color:#ff9800;background:rgba(255,152,0,0.1);color:#ff9800;}
  #top-btn{position:fixed;bottom:28px;right:28px;background:var(--green);color:#000;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(118,185,0,0.3);text-transform:none;letter-spacing:0;padding:0;font-family:sans-serif;}
  #top-btn:hover{background:#8fd100;color:#000;}
  @media(max-width:600px){header,.controls,.filter-tabs,.overall-progress{padding-left:16px;padding-right:16px;}main{padding:20px 12px 60px;}.results-score{font-size:48px;}}

  .author-block{text-align:right;line-height:1.4;}
  .author-name{font-family:var(--head);font-size:13px;font-weight:700;color:var(--green);letter-spacing:0.02em;}
  .author-cred{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:0.04em;text-transform:uppercase;margin-top:2px;}
  .author-link{font-family:var(--mono);font-size:10px;color:var(--green-dim);text-decoration:none;letter-spacing:0.04em;}
  .author-link:hover{color:var(--green);text-decoration:underline;}
</style>

<script>
const questions = [

// ── COMPOSITION (16) ────────────────────────────────
{
  id:1, domain:"Composition",
  text:"A studio uses a `/_class_Shadeable` class prim to broadcast a render-visibility override to all assets that inherit from it. An individual asset's local layer sets `visibility = invisible` on its root prim. Which value wins?",
  multi:false,
  options:[
    "The class prim's value wins because inherits arcs define the authoritative look",
    "The asset's local opinion wins, because in LIVERPS local opinions (L) are stronger than inherits (I)",
    "The two opinions are averaged — the asset is rendered at 50% opacity",
    "USD raises a composition conflict and neither value is used"
  ],
  answer:[1],
  explanation:"LIVERPS: <strong>Local (L) > Inherits (I)</strong>. A local opinion on the asset's own root prim is always stronger than what flows in from a class prim via `inherits`. The asset's `visibility = invisible` wins. This is why class prims are good for 'broad defaults' — individual assets can always override them locally."
},
{
  id:2, domain:"Composition",
  text:"In USD, what does the term 'opinion' mean in the context of scene description?",
  multi:false,
  options:[
    "A user preference stored in the application settings that affects USD display",
    "A value for an attribute or metadata that a specific layer is asserting — one layer's contribution to the final composed value",
    "A render setting that tells the renderer how to interpret geometry",
    "A validation result from `usdchecker` indicating a possible compliance issue"
  ],
  answer:[1],
  explanation:"In USD, an <strong>opinion</strong> is the value that a specific layer asserts for an attribute, property, or metadata entry. Multiple layers can have opinions on the same attribute; the composition system uses LIVERPS to determine which opinion wins. The winning opinion becomes the <em>resolved value</em> on the composed stage."
},
{
  id:3, domain:"Composition",
  text:"A reference arc and a payload arc both point to the same layer file. An artist unloads the prim that uses the payload arc. What happens to the prim that uses the reference arc?",
  multi:false,
  options:[
    "The reference prim is also unloaded because both arcs point to the same file",
    "The reference prim remains fully loaded — reference arcs are not affected by payload load/unload operations",
    "Both prims enter a 'half-loaded' state sharing whatever data is currently cached",
    "USD raises an error because the same file cannot be used by both a reference and a payload"
  ],
  answer:[1],
  explanation:"<strong>Reference arcs and payload arcs are independent</strong>. Unloading a payload prim only affects that prim's payload arc. A separate prim that references the same file via a reference arc is not affected — references are always loaded. This is fundamental to the difference between the two arcs: payloads are controllable; references are not."
},
{
  id:4, domain:"Composition",
  text:"A scene layer defines `/World/Tree` as an `over`. No other layer defines `/World/Tree` with a `def`. What is the result on the composed stage?",
  multi:false,
  options:[
    "The prim exists as a typeless prim with whatever opinions the `over` contributed",
    "The `over` is silently ignored — USD only composes prims that have at least one `def` somewhere in the layer stack",
    "The `over` is treated as a `def` and the prim is created with no type",
    "USD raises a fatal error because `over` requires an existing definition"
  ],
  answer:[0],
  explanation:"A prim defined only by `over` (with no `def` anywhere in the layer stack) is called a <strong>typeless def</strong> or <strong>pure over</strong>. It does exist on the composed stage as a typeless prim and its opinions are accessible. It will not have an IsA schema type. Some traversal predicates exclude typeless prims, but they are valid scene description. This is a common source of unexpected behavior when `def` layers are missing."
},
{
  id:5, domain:"Composition",
  text:"What is the purpose of the `edit target` in a USD stage?",
  multi:false,
  options:[
    "It specifies which renderer should be used for the current viewport session",
    "It designates which layer (and optionally which prim path mapping) receives newly authored opinions when a stage edit API is called",
    "It sets the default time code for all attribute queries on the stage",
    "It defines the root layer that all sublayers are resolved relative to"
  ],
  answer:[1],
  explanation:"The <strong>edit target</strong> determines where new scene description is written when you call USD's authoring APIs (e.g., `UsdAttribute::Set()`, `UsdPrim::SetActive()`). By default it is the root layer, but you can redirect edits to any layer in the stage's layer stack — including sublayers, layers inside references, or even variant layers. This is how artists and tools author opinions into specific layers."
},
{
  id:6, domain:"Composition",
  text:"A value clip is configured on a prim. The clip's `clipActive` metadata specifies that clip 0 is active from stage time 1 to 50, and clip 1 is active from stage time 51 to 100. What happens when the stage is queried at time 75?",
  multi:false,
  options:[
    "USD uses clip 0 because it was defined first",
    "USD uses clip 1, which is active for the time range covering stage time 75",
    "USD interpolates between clip 0 and clip 1 to produce a blended value",
    "USD falls back to the attribute's default value when multiple clips are defined"
  ],
  answer:[1],
  explanation:"<strong>Value clips</strong> use `clipActive` to define which external animation clip is active at each stage time. At time 75, `clipActive` specifies <strong>clip 1</strong> is active (range 51–100). USD reads the attribute value from clip 1's layer at the corresponding local clip time. There is no blending between clips — the active clip is used exclusively during its active time range."
},
{
  id:7, domain:"Composition",
  text:"A USD `over` prim in a shot layer adds a new child prim `Sparkle` under a referenced asset's existing prim. The referenced asset does not define `Sparkle`. After composition, what is the status of `/World/Prop/Sparkle`?",
  multi:false,
  options:[
    "It is silently ignored — you cannot add child prims to referenced assets from a downstream layer",
    "It exists on the composed stage as a new prim contributed by the shot layer's local opinion, sitting alongside the referenced asset's prims",
    "It causes a composition error because the referenced asset does not define that path",
    "It is added to the referenced asset file on disk automatically"
  ],
  answer:[1],
  explanation:"USD's composition model allows downstream layers to <strong>add new prims</strong> (as children of any existing prim, even one from a reference) via local opinions. The shot layer's `over` on `/World/Prop` can contain a child `def Sparkle` that creates a new prim at `/World/Prop/Sparkle` on the composed stage. The referenced asset is not modified — this is purely a local addition in the stronger layer."
},
{
  id:8, domain:"Composition",
  text:"Which statement correctly describes the relationship between `sublayers` and `references` with respect to namespace?",
  multi:false,
  options:[
    "Both sublayers and references graft content under a target prim path",
    "Sublayers contribute their prims at the same namespace root as the stage; references graft content under the specific prim path that holds the reference arc",
    "Sublayers are limited to contributing material prims; references can contribute any prim type",
    "References share the same namespace as sublayers — both are merged at the root level"
  ],
  answer:[1],
  explanation:"<strong>Sublayers</strong> merge their entire prim namespace at the stage root level — a prim at `/World/Chair` in a sublayer appears at `/World/Chair` in the composed stage. <strong>References</strong> graft content under a specific prim — a file with defaultPrim `Chair` referenced at `/Scene/Furniture` creates `/Scene/Furniture/Chair` (and descendants) in the composed stage. This namespace behavior is a fundamental architectural difference."
},
{
  id:9, domain:"Composition",
  text:"A pipeline engineer wants to use the `specializes` arc to share a look-dev base for all metal assets. Why is `specializes` preferred over `inherits` for this use case?",
  multi:false,
  options:[
    "Specializes supports time-sampled opinions; inherits does not",
    "Specializes arcs are weaker than all other arcs including local opinions, meaning asset-specific look refinements always override the base while still receiving the base's defaults — the base 'specializes' the general concept for a specific case",
    "Inherits can only be used with class prims; specializes works with any prim type",
    "Specializes is more memory-efficient than inherits for large numbers of prims"
  ],
  answer:[1],
  explanation:"<strong>Specializes</strong> is the <em>weakest</em> composition arc in LIVERPS. This means: the specializing asset's own opinions (local, inherits, variants, references, payloads) all override the base's opinions — the base provides sensible defaults while specific assets can freely refine them. `Inherits` is stronger than variants/references, which can interfere with asset-level overrides. Specializes is ideal for 'base class with refinements' patterns in look-dev."
},
{
  id:10, domain:"Composition",
  text:"A shot pipeline wants to isolate a specific prim from all camera framing and rendering tools without deleting it. Which USD mechanism accomplishes this without modifying the asset file?",
  multi:false,
  options:[
    "Set `purpose = guide` on the prim in the shot layer so it is excluded from render and proxy traversal",
    "Set `active = false` on the prim in the shot layer — deactivated prims are pruned from traversal and invisible to renderers",
    "Add the prim to a `_class_Hidden` class and override its `visibility` attribute to `invisible`",
    "Both A and B are valid approaches with different semantic meanings"
  ],
  answer:[3],
  explanation:"Both approaches work but have different semantics: <strong>`active = false`</strong> completely <em>deactivates</em> the prim — it is pruned from all traversal and acts as if it doesn't exist. <strong>`purpose = guide`</strong> keeps the prim traversable but signals that it is a non-renderable guide element excluded from render/proxy traversal. The right choice depends on whether you want the prim accessible to tools at all or just excluded from rendering."
},
{
  id:11, domain:"Composition",
  text:"A USD layer has `subLayers = [@./lighting.usda@, @./animation.usda@, @./layout.usda@]`. A developer changes this to `subLayers = [@./animation.usda@, @./lighting.usda@, @./layout.usda@]`. What changes in the composed stage?",
  multi:false,
  options:[
    "Nothing changes — sublayer order only affects load performance, not opinion strength",
    "Attributes where `animation.usda` and `lighting.usda` have conflicting opinions will now resolve to `animation.usda`'s value instead of `lighting.usda`'s",
    "All opinions from `lighting.usda` are now ignored because it is no longer first",
    "The stage must be fully reloaded before any ordering change takes effect"
  ],
  answer:[1],
  explanation:"Sublayer order determines opinion strength: earlier layers are stronger. By moving `animation.usda` before `lighting.usda`, animation's opinions now win over lighting's where they conflict. For example, if both layers set `xformOp:translate` on the same prim, the composed value changes from `lighting.usda`'s value to `animation.usda`'s value. <strong>Sublayer ordering is a critical pipeline design decision.</strong>"
},
{
  id:12, domain:"Composition",
  text:"An asset at `vehicle.usda` is referenced twice into the same scene: once at `/Scene/CarA` and once at `/Scene/CarB`. Both use `instanceable = true` and reference the same file. A variant `color = red` is set on `CarA` and `color = blue` on `CarB`. Can they still share an instancing prototype?",
  multi:false,
  options:[
    "Yes — both prims share the same prototype regardless of variant selections",
    "No — USD creates separate prototypes for each unique combination of composition metadata, including variant selections, so CarA and CarB get different prototypes",
    "Yes — variant selections are ignored when `instanceable = true` is set",
    "No — USD does not support variant sets on instanceable prims"

    "Use UsdCollectionAPI on the light to define a `lightLink` collection that includes only the prims the light should illuminate",
    "Set `purpose = render` on the target prims and `purpose = proxy` on all other prims",
    "Use the light's `radius` attribute to limit the physical range of illumination"
  ],
  answer:[1],
  explanation:"<strong>Light linking</strong> in UsdLux uses <strong>`UsdCollectionAPI`</strong> applied to the light prim. A `lightLink` collection defines which prims a light illuminates (include/exclude lists). A `shadowLink` collection controls which prims cast shadows from that light. This allows fine-grained control over light-geometry interactions without render layers or geometry modifications."
},
{
  id:70, domain:"Visualization",
  text:"A rendering engineer observes that a geometry-heavy USD scene with correct materials renders at an acceptable speed, but the same scene with a large number of UsdLux lights is very slow. What USD/Hydra feature can help manage this?",
  multi:false,
  options:[
    "Convert all lights from UsdLux to custom shader-based emissive materials",
    "Use `UsdLuxLightAPI.inputs:enableColorTemperature` to reduce light computation overhead",
    "Place all lights behind payload arcs and only load the lights needed for each shot using the stage's load set — reducing the number of active lights Hydra processes",
    "Set `purpose = proxy` on all lights not actively contributing to the scene"
  ],
  answer:[2],
  explanation:"Placing lights behind <strong>payload arcs</strong> and using USD's <strong>working set management</strong> (`UsdStage::LoadSet`) to load only the lights needed for a specific shot or render region is an effective strategy for managing large numbers of lights. Unloaded payload lights are not evaluated or sent to Hydra, reducing the renderer's light count to only what is needed. This is the USD-native approach to shot-level light management."
}

]; // end questions

// ═══════════════════════════════════════════════════════════
// STATE + ENGINE
// ═══════════════════════════════════════════════════════════
const state={selections:{},revealed:{},flags:{},submitted:false};

function getDomainSections(){
  const order=["Composition","Content Aggregation","Customizing USD","Data Exchange","Data Modeling","Debugging","Pipeline Development","Visualization"];
  const map={};order.forEach(d=>map[d]=[]);
  questions.forEach(q=>{const key=order.find(k=>q.domain.includes(k.split(' ')[0]))||q.domain;if(map[key])map[key].push(q);});
  return{order,map};
}

function buildQuiz(){
  const container=document.getElementById('quiz-container');container.innerHTML='';
  const{order,map}=getDomainSections();
  order.forEach(domain=>{
    const qs=map[domain];if(!qs||qs.length===0)return;
    const sh=document.createElement('div');sh.className='section-header';sh.setAttribute('data-domain',domain);sh.textContent=domain;container.appendChild(sh);
    qs.forEach(q=>container.appendChild(buildCard(q)));
  });
}

function buildCard(q){
  const card=document.createElement('div');card.className='question-card';card.id=`q-${q.id}`;card.setAttribute('data-domain',q.domain);
  const header=document.createElement('div');header.className='q-header';
  header.innerHTML=`<div class="q-num">#${q.id}</div><div class="q-meta"><div class="q-domain">${q.domain} · ${getDomainWeight(q.domain)}% exam weight</div><div class="q-text">${q.text}</div></div><div class="q-expand-icon">▾</div>`;
  header.addEventListener('click',()=>toggleCard(q.id));card.appendChild(header);
  const body=document.createElement('div');body.className='q-body';body.id=`body-${q.id}`;
  if(q.multi)body.innerHTML+=`<div class="multi-note">★ SELECT ALL THAT APPLY</div>`;
  const opts=document.createElement('div');opts.className='options';
  const letters=['A','B','C','D','E'];
  q.options.forEach((opt,i)=>{
    const el=document.createElement('div');el.className='option';el.id=`opt-${q.id}-${i}`;
    el.innerHTML=`<span class="opt-key">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    el.addEventListener('click',()=>selectOption(q.id,i));opts.appendChild(el);
  });
  body.appendChild(opts);
  const actions=document.createElement('div');actions.className='q-actions';
  actions.innerHTML=`<button onclick="checkAnswer(${q.id})">Check Answer</button><button onclick="revealExplanation(${q.id})">Show Explanation</button><button class="flag-btn" id="flag-${q.id}" onclick="toggleFlag(${q.id})">Flag</button>`;
  body.appendChild(actions);
  const explanation=document.createElement('div');explanation.className='explanation';explanation.id=`exp-${q.id}`;
  explanation.innerHTML=`<strong>Explanation:</strong> ${q.explanation}`;body.appendChild(explanation);
  card.appendChild(body);return card;
}

function getDomainWeight(domain){
  const w={"Composition":23,"Content Aggregation":10,"Customizing USD":6,"Data Exchange":15,"Data Modeling":13,"Debugging":11,"Pipeline Development":14,"Visualization":8};
  for(const[k,v]of Object.entries(w)){if(domain.includes(k.split(' ')[0]))return v;}return 0;
}

function toggleCard(qId){
  const body=document.getElementById(`body-${qId}`);const icon=document.querySelector(`#q-${qId} .q-expand-icon`);
  body.classList.toggle('open');icon.classList.toggle('open');
}

function selectOption(qId,idx){
  if(state.submitted)return;
  const q=questions.find(x=>x.id===qId);
  if(!state.selections[qId])state.selections[qId]=new Set();
  if(q.multi){if(state.selections[qId].has(idx))state.selections[qId].delete(idx);else state.selections[qId].add(idx);}
  else state.selections[qId]=new Set([idx]);
  renderOptions(qId,false);updateStats();
}

function renderOptions(qId,showCorrect){
  const q=questions.find(x=>x.id===qId);const sel=state.selections[qId]||new Set();
  q.options.forEach((_,i)=>{
    const el=document.getElementById(`opt-${qId}-${i}`);el.className='option';
    const isSelected=sel.has(i);const isCorrect=q.answer.includes(i);
    if(showCorrect){if(isSelected&&isCorrect)el.classList.add('correct');else if(isSelected&&!isCorrect)el.classList.add('incorrect');else if(!isSelected&&isCorrect)el.classList.add('reveal-correct');}
    else if(isSelected)el.classList.add('selected');
  });
}

function checkAnswer(qId){
  const q=questions.find(x=>x.id===qId);const sel=state.selections[qId];
  if(!sel||sel.size===0){alert('Please select an answer first.');return;}
  renderOptions(qId,true);revealExplanation(qId);
  const card=document.getElementById(`q-${qId}`);
  card.setAttribute('data-answered',setsEqual(sel,new Set(q.answer))?'correct':'incorrect');
  state.revealed[qId]=true;updateStats();
}

function revealExplanation(qId){
  const exp=document.getElementById(`exp-${qId}`);const body=document.getElementById(`body-${qId}`);
  exp.classList.add('visible');if(!body.classList.contains('open'))toggleCard(qId);
}

function revealAll(){
  questions.forEach(q=>{
    if(!state.revealed[q.id]){
      renderOptions(q.id,true);revealExplanation(q.id);
      const sel=state.selections[q.id];const card=document.getElementById(`q-${q.id}`);
      if(sel&&sel.size>0)card.setAttribute('data-answered',setsEqual(sel,new Set(q.answer))?'correct':'incorrect');
      state.revealed[q.id]=true;
    }
  });updateStats();
}

function submitAll(){
  state.submitted=true;let correct=0,incorrect=0,skipped=0;const domainStats={};
  questions.forEach(q=>{
    const domain=q.domain;if(!domainStats[domain])domainStats[domain]={c:0,t:0};domainStats[domain].t++;
    const sel=state.selections[q.id];renderOptions(q.id,true);revealExplanation(q.id);
    const card=document.getElementById(`q-${q.id}`);
    if(!sel||sel.size===0){skipped++;card.setAttribute('data-answered','flagged');}
    else if(setsEqual(sel,new Set(q.answer))){correct++;domainStats[domain].c++;card.setAttribute('data-answered','correct');}
    else{incorrect++;card.setAttribute('data-answered','incorrect');}
    state.revealed[q.id]=true;
  });
  const pct=Math.round((correct/questions.length)*100);
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-incorrect').textContent=incorrect;
  document.getElementById('res-skipped').textContent=skipped;
  const db=document.getElementById('domain-breakdown');db.innerHTML='';
  Object.entries(domainStats).forEach(([domain,s])=>{
    const pctD=s.t>0?Math.round((s.c/s.t)*100):0;
    const color=pctD>=70?'#4caf50':pctD>=50?'#ff9800':'#f44336';
    db.innerHTML+=`<div class="domain-row"><div class="domain-name">${domain}</div><div class="domain-score" style="color:${color}">${s.c}/${s.t} — ${pctD}%</div></div>`;
  });
  document.getElementById('results-panel').classList.add('visible');
  window.scrollTo({top:0,behavior:'smooth'});updateStats();
}

function resetExam(){
  Object.keys(state.selections).forEach(k=>delete state.selections[k]);
  Object.keys(state.revealed).forEach(k=>delete state.revealed[k]);
  Object.keys(state.flags).forEach(k=>delete state.flags[k]);
  state.submitted=false;buildQuiz();
  document.getElementById('results-panel').classList.remove('visible');
  updateStats();window.scrollTo({top:0,behavior:'smooth'});
}

function toggleFlag(qId){
  const btn=document.getElementById(`flag-${qId}`);const card=document.getElementById(`q-${qId}`);
  if(state.flags[qId]){delete state.flags[qId];btn.classList.remove('flagged');if(card.getAttribute('data-answered')==='flagged')card.removeAttribute('data-answered');}
  else{state.flags[qId]=true;btn.classList.add('flagged');}
  updateStats();
}

function filterDomain(domain,btn){
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.question-card,.section-header').forEach(el=>{
    if(domain==='all')el.style.display='';
    else{const elDomain=el.getAttribute('data-domain')||'';el.style.display=elDomain.includes(domain)?'':'none';}
  });
}

function scrollToFirstUnanswered(){
  for(const q of questions){
    const card=document.getElementById(`q-${q.id}`);
    if(card&&card.style.display!=='none'&&!state.revealed[q.id]){
      card.scrollIntoView({behavior:'smooth',block:'center'});
      card.classList.add('highlighted');setTimeout(()=>card.classList.remove('highlighted'),1500);return;
    }
  }
  alert('All visible questions have been answered!');
}

function updateStats(){
  let answered=0,correct=0,incorrect=0,flagged=0;
  questions.forEach(q=>{
    if(state.revealed[q.id]){const sel=state.selections[q.id];if(sel&&sel.size>0){answered++;if(setsEqual(sel,new Set(q.answer)))correct++;else incorrect++;}}
    if(state.flags[q.id])flagged++;
  });
  document.getElementById('hdr-answered').textContent=answered;
  document.getElementById('hdr-correct').textContent=correct;
  document.getElementById('hdr-incorrect').textContent=incorrect;
  document.getElementById('hdr-flagged').textContent=flagged;
  const pct=Math.round((answered/questions.length)*100);
  document.getElementById('prog-label').textContent=`${answered} / ${questions.length}`;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

function setsEqual(a,b){if(a.size!==b.size)return false;for(const v of a)if(!b.has(v))return false;return true;}

buildQuiz();updateStats();
</script>
</body>
</html>
